version: '3.8'

services:
  holyc-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terrystemple_bot
    restart: unless-stopped
    
    # Windows: use bridge network with host.docker.internal
    # Linux: use host network
    network_mode: "bridge"
    
    volumes:
      # Persistent database
      - ./data:/app/data
      # Config file (read-only)
      - ./config.txt:/app/config.txt:ro
      - ./personality.txt:/app/personality.txt:ro
    
    environment:
      # Ollama on Windows host accessible via host.docker.internal
      - OLLAMA_HOST=http://host.docker.internal:11434
    
    # Add extra_hosts for Windows Docker Desktop
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
